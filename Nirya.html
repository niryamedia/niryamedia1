<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nirya Media</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0f172a;color:#fff}
header{display:flex;justify-content:space-between;padding:20px;background:#020617}
h1{color:#a855f7}
.section{padding:40px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.creator-card{background:#1e293b;padding:20px;border-radius:10px;text-align:center}
input,button{padding:10px;margin:5px;border:none;border-radius:6px}
button{background:#a855f7;color:#fff;cursor:pointer}
.admin{background:#020617;padding:20px;margin:20px}
</style>
</head>
<body>

<header>
<h1>Nirya Media</h1>
</header>

<section class="section">
<h2>Add Creator (Admin Panel)</h2>
<div class="admin">
<input type="text" id="name" placeholder="Creator Name">
<input type="text" id="niche" placeholder="Niche (Gaming, Vlog)">
<input type="text" id="followers" placeholder="Followers">
<input type="text" id="image" placeholder="Image URL">
<button onclick="addCreator()">Add Creator</button>
</div>
</section>

<section class="section">
<h2>Our Creators</h2>
<div class="cards" id="creatorList"></div>
</section>

<script>
let creators = JSON.parse(localStorage.getItem('creators')) || [];

function displayCreators(){
  const list = document.getElementById('creatorList');
  list.innerHTML = '';
  creators.forEach(c => {
    list.innerHTML += `
    <div class="creator-card">
      <img src="${c.image}" width="80" height="80" style="border-radius:50%"><br>
      <h3>${c.name}</h3>
      <p>${c.niche} | ${c.followers}</p>
    </div>`;
  });
}

function addCreator(){
  const name = document.getElementById('name').value;
  const niche = document.getElementById('niche').value;
  const followers = document.getElementById('followers').value;
  const image = document.getElementById('image').value;

  creators.push({name,niche,followers,image});
  localStorage.setItem('creators', JSON.stringify(creators));

  displayCreators();
}

displayCreators();
</script>

</body>
</html>
